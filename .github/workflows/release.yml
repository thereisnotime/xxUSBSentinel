name: Release

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always

permissions: read-all

jobs:
  build-linux:
    name: Build Linux (binary + AppImage)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libusb-1.0-0-dev pkg-config libxdo-dev \
            libgtk-3-dev libxkbcommon-dev libgles2-mesa-dev \
            libwayland-dev libxrandr-dev libxi-dev libxcursor-dev \
            squashfs-tools file

      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # stable
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      - name: Build release
        run: cargo build --release

      - name: Stage binary
        run: |
          VERSION="${GITHUB_REF_NAME}"
          ARCH="$(uname -m)"
          BINARY_NAME="xxusbsentinel-${VERSION}-linux-${ARCH}"
          mkdir -p dist
          cp target/release/xxusbsentinel "dist/${BINARY_NAME}"
          echo "ASSET=dist/${BINARY_NAME}" >> "$GITHUB_ENV"
          echo "ASSET_NAME=${BINARY_NAME}" >> "$GITHUB_ENV"

      - name: Build AppImage
        continue-on-error: true
        env:
          APPIMAGE_EXTRACT_AND_RUN: "1"
          DEPLOY_GTK_VERSION: "3"
        run: |
          set -x
          # Ubuntu 24.04 restricts user namespaces via AppArmor; AppImages need this relaxed
          sudo sysctl -w kernel.apparmor_restrict_unprivileged_userns=0

          VERSION="${GITHUB_REF_NAME}"
          ARCH="$(uname -m)"
          APPIMAGE_NAME="xxusbsentinel-${VERSION}-linux-${ARCH}.AppImage"

          # linuxdeploy is an AppImage; the GTK plugin is a shell script (no AppImage release)
          curl -fsSL "https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage" -o linuxdeploy-x86_64.AppImage
          curl -fsSL "https://raw.githubusercontent.com/linuxdeploy/linuxdeploy-plugin-gtk/master/linuxdeploy-plugin-gtk.sh" -o linuxdeploy-plugin-gtk
          chmod +x linuxdeploy-x86_64.AppImage linuxdeploy-plugin-gtk

          export OUTPUT="${APPIMAGE_NAME}"
          ./linuxdeploy-x86_64.AppImage \
            --appdir AppDir \
            --executable target/release/xxusbsentinel \
            --desktop-file packaging/appimage/xxusbsentinel.desktop \
            --icon-file resources/guard-on.png \
            --plugin gtk \
            --output appimage

          mv "${APPIMAGE_NAME}" "dist/${APPIMAGE_NAME}"
          echo "APPIMAGE=dist/${APPIMAGE_NAME}" >> "$GITHUB_ENV"
          echo "APPIMAGE_NAME=${APPIMAGE_NAME}" >> "$GITHUB_ENV"

      - name: Sign tar.gz with cosign (keyless)
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
      - run: |
          cosign sign-blob --yes \
            --bundle "${ASSET_NAME}.bundle" \
            "${{ env.ASSET }}"

      - name: Sign AppImage with cosign (keyless)
        if: env.APPIMAGE != ''
        run: |
          cosign sign-blob --yes \
            --bundle "${APPIMAGE_NAME}.bundle" \
            "${{ env.APPIMAGE }}"

      - name: Attest tar.gz provenance
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: ${{ env.ASSET }}

      - name: Attest AppImage provenance
        if: env.APPIMAGE != ''
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: ${{ env.APPIMAGE }}

      - name: Upload artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: linux-binary
          path: |
            ${{ env.ASSET }}
            ${{ env.ASSET_NAME }}.bundle

  build-windows:
    name: Build Windows (binary + Chocolatey)
    runs-on: windows-latest
    permissions:
      contents: read
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # stable
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      - name: Build release
        run: cargo build --release

      - name: Stage binary
        shell: pwsh
        run: |
          $VERSION = $env:GITHUB_REF_NAME
          $BINARY_NAME = "xxusbsentinel-$VERSION-windows-x86_64.exe"
          New-Item -ItemType Directory -Force -Path dist
          Copy-Item "target\release\xxusbsentinel.exe" "dist\$BINARY_NAME"
          echo "ASSET=dist/$BINARY_NAME" >> $env:GITHUB_ENV
          echo "ASSET_NAME=$BINARY_NAME" >> $env:GITHUB_ENV

      - name: Build Chocolatey package
        shell: pwsh
        run: |
          $VERSION = $env:GITHUB_REF_NAME -replace '^v',''

          $hash = (Get-FileHash $env:ASSET -Algorithm SHA256).Hash.ToUpper()

          # Inject checksum into install script
          (Get-Content packaging\chocolatey\tools\chocolateyInstall.ps1) `
            -replace 'REPLACE_CHECKSUM', $hash |
            Set-Content packaging\chocolatey\tools\chocolateyInstall.ps1

          # Pack
          choco pack packaging\chocolatey\xxusbsentinel.nuspec `
            --version $VERSION `
            --out dist

          echo "NUPKG=dist/xxusbsentinel.$VERSION.nupkg" >> $env:GITHUB_ENV

      - name: Sign with cosign (keyless)
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
      - shell: bash
        run: |
          cosign sign-blob --yes \
            --bundle "${ASSET_NAME}.bundle" \
            "${{ env.ASSET }}"

      - name: Attest build provenance
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: ${{ env.ASSET }}

      - name: Upload artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: windows-binary
          path: |
            ${{ env.ASSET }}
            ${{ env.ASSET_NAME }}.bundle
            ${{ env.NUPKG }}

  release:
    name: Create GitHub release
    runs-on: ubuntu-latest
    needs: [build-linux, build-windows]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Download artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: dist
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd dist
          sha256sum ./* 2>/dev/null | grep -v checksums | tee checksums.sha256

      - name: Create release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          name: ${{ github.ref_name }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: dist/*

  publish-chocolatey:
    name: Publish to Chocolatey
    runs-on: windows-latest
    needs: release
    env:
      CHOCOLATEY_API_KEY: ${{ secrets.CHOCOLATEY_API_KEY }}
    steps:
      - name: Download artifacts
        if: env.CHOCOLATEY_API_KEY != ''
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: windows-binary
          path: dist

      - name: Push to Chocolatey
        if: env.CHOCOLATEY_API_KEY != ''
        shell: pwsh
        run: |
          $nupkg = Get-ChildItem dist\*.nupkg | Select-Object -First 1
          choco apikey --key $env:CHOCOLATEY_API_KEY --source https://push.chocolatey.org/
          choco push $nupkg.FullName --source https://push.chocolatey.org/

  publish-winget:
    name: Publish to WinGet
    runs-on: ubuntu-latest
    needs: release
    env:
      WINGET_TOKEN: ${{ secrets.WINGET_TOKEN }}
    steps:
      - name: Publish WinGet release
        if: env.WINGET_TOKEN != ''
        uses: vedantmgoyal9/winget-releaser@4ffc7888bffd451b357355dc214d43bb9f23917e # v2
        with:
          identifier: thereisnotime.xxUSBSentinel
          installers-regex: 'windows-x86_64\.exe$'
          token: ${{ secrets.WINGET_TOKEN }}
