name: Release

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always

jobs:
  build-linux:
    name: Build Linux (binary + AppImage)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libusb-1.0-0-dev pkg-config libxdo-dev \
            libgtk-3-dev libxkbcommon-dev libgles2-mesa-dev \
            libwayland-dev libxrandr-dev libxi-dev libxcursor-dev \
            squashfs-tools file

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Build release
        run: cargo build --release

      - name: Package tar.gz
        run: |
          VERSION=${GITHUB_REF_NAME}
          ARCH=$(uname -m)
          PKG="xxusbsentinel-${VERSION}-linux-${ARCH}"
          mkdir -p "dist/${PKG}"
          cp target/release/xxusbsentinel "dist/${PKG}/"
          cp README.md LICENSE "dist/${PKG}/" 2>/dev/null || true
          tar -czf "dist/${PKG}.tar.gz" -C dist "${PKG}"
          echo "ASSET=dist/${PKG}.tar.gz" >> $GITHUB_ENV
          echo "ASSET_NAME=${PKG}.tar.gz" >> $GITHUB_ENV

      - name: Build AppImage
        env:
          APPIMAGE_EXTRACT_AND_RUN: "1"
          DEPLOY_GTK_VERSION: "3"
        run: |
          VERSION=${GITHUB_REF_NAME}
          ARCH=$(uname -m)
          APPIMAGE_NAME="xxusbsentinel-${VERSION}-linux-${ARCH}.AppImage"

          wget -q "https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage"
          wget -q "https://github.com/linuxdeploy/linuxdeploy-plugin-gtk/releases/download/continuous/linuxdeploy-plugin-gtk-x86_64.AppImage"
          chmod +x linuxdeploy-x86_64.AppImage linuxdeploy-plugin-gtk-x86_64.AppImage

          export OUTPUT="${APPIMAGE_NAME}"
          ./linuxdeploy-x86_64.AppImage \
            --appdir AppDir \
            --executable target/release/xxusbsentinel \
            --desktop-file packaging/appimage/xxusbsentinel.desktop \
            --icon-file resources/guard-on.png \
            --plugin gtk \
            --output appimage

          mv "${APPIMAGE_NAME}" "dist/${APPIMAGE_NAME}"
          echo "APPIMAGE=dist/${APPIMAGE_NAME}" >> $GITHUB_ENV
          echo "APPIMAGE_NAME=${APPIMAGE_NAME}" >> $GITHUB_ENV

      - name: Sign tar.gz with cosign (keyless)
        uses: sigstore/cosign-installer@v3
      - run: |
          cosign sign-blob --yes \
            --bundle "${ASSET_NAME}.bundle" \
            "${{ env.ASSET }}"

      - name: Sign AppImage with cosign (keyless)
        run: |
          cosign sign-blob --yes \
            --bundle "${APPIMAGE_NAME}.bundle" \
            "${{ env.APPIMAGE }}"

      - name: Attest tar.gz provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: ${{ env.ASSET }}

      - name: Attest AppImage provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: ${{ env.APPIMAGE }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-binary
          path: |
            ${{ env.ASSET }}
            ${{ env.ASSET_NAME }}.bundle
            ${{ env.APPIMAGE }}
            ${{ env.APPIMAGE_NAME }}.bundle

  build-windows:
    name: Build Windows (binary + Chocolatey)
    runs-on: windows-latest
    permissions:
      contents: read
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Build release
        run: cargo build --release

      - name: Package zip
        shell: pwsh
        run: |
          $VERSION = $env:GITHUB_REF_NAME
          $PKG = "xxusbsentinel-$VERSION-windows-x86_64"
          New-Item -ItemType Directory -Force -Path "dist\$PKG"
          Copy-Item "target\release\xxusbsentinel.exe" "dist\$PKG\"
          Copy-Item "README.md","LICENSE" "dist\$PKG\" -ErrorAction SilentlyContinue
          Compress-Archive -Path "dist\$PKG" -DestinationPath "dist\$PKG.zip"
          echo "ASSET=dist/$PKG.zip" >> $env:GITHUB_ENV
          echo "ASSET_NAME=$PKG.zip" >> $env:GITHUB_ENV

      - name: Build Chocolatey package
        shell: pwsh
        run: |
          $VERSION = $env:GITHUB_REF_NAME -replace '^v',''
          $ZIP = $env:ASSET

          # Compute SHA256 of the zip
          $hash = (Get-FileHash $ZIP -Algorithm SHA256).Hash.ToUpper()

          # Inject checksum into install script
          (Get-Content packaging\chocolatey\tools\chocolateyInstall.ps1) `
            -replace 'REPLACE_CHECKSUM', $hash |
            Set-Content packaging\chocolatey\tools\chocolateyInstall.ps1

          # Pack
          choco pack packaging\chocolatey\xxusbsentinel.nuspec `
            --version $VERSION `
            --out dist

          echo "NUPKG=dist/xxusbsentinel.$VERSION.nupkg" >> $env:GITHUB_ENV

      - name: Sign with cosign (keyless)
        uses: sigstore/cosign-installer@v3
      - shell: bash
        run: |
          cosign sign-blob --yes \
            --bundle "${ASSET_NAME}.bundle" \
            "${{ env.ASSET }}"

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: ${{ env.ASSET }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-binary
          path: |
            ${{ env.ASSET }}
            ${{ env.ASSET_NAME }}.bundle
            ${{ env.NUPKG }}

  release:
    name: Create GitHub release
    runs-on: ubuntu-latest
    needs: [build-linux, build-windows]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: dist/*

  publish-chocolatey:
    name: Publish to Chocolatey
    runs-on: windows-latest
    needs: release
    if: ${{ secrets.CHOCOLATEY_API_KEY != '' }}
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: windows-binary
          path: dist

      - name: Push to Chocolatey
        shell: pwsh
        run: |
          $nupkg = Get-ChildItem dist\*.nupkg | Select-Object -First 1
          choco apikey --key $env:CHOCOLATEY_API_KEY --source https://push.chocolatey.org/
          choco push $nupkg.FullName --source https://push.chocolatey.org/
        env:
          CHOCOLATEY_API_KEY: ${{ secrets.CHOCOLATEY_API_KEY }}

  publish-winget:
    name: Publish to WinGet
    runs-on: ubuntu-latest
    needs: release
    if: ${{ secrets.WINGET_TOKEN != '' }}
    steps:
      - uses: vedantmgoyal9/winget-releaser@v2
        with:
          identifier: thereisnotime.xxUSBSentinel
          installers-regex: 'windows-x86_64\.zip$'
          token: ${{ secrets.WINGET_TOKEN }}
