name: Release

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always

jobs:
  build-linux:
    name: Build Linux binary
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libusb-1.0-0-dev pkg-config libxdo-dev \
            libgtk-3-dev libxkbcommon-dev libgles2-mesa-dev \
            libwayland-dev libxrandr-dev libxi-dev libxcursor-dev

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Build release
        run: cargo build --release

      - name: Package
        run: |
          VERSION=${GITHUB_REF_NAME}
          ARCH=$(uname -m)
          PKG="xxusbsentinel-${VERSION}-linux-${ARCH}"
          mkdir -p "dist/${PKG}"
          cp target/release/xxusbsentinel "dist/${PKG}/"
          cp README.md LICENSE "dist/${PKG}/" 2>/dev/null || true
          tar -czf "dist/${PKG}.tar.gz" -C dist "${PKG}"
          echo "ASSET=dist/${PKG}.tar.gz" >> $GITHUB_ENV
          echo "ASSET_NAME=${PKG}.tar.gz" >> $GITHUB_ENV

      - name: Sign with cosign (keyless)
        uses: sigstore/cosign-installer@v3
      - run: |
          cosign sign-blob --yes \
            --bundle "${ASSET_NAME}.bundle" \
            "${{ env.ASSET }}"

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: ${{ env.ASSET }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-binary
          path: |
            ${{ env.ASSET }}
            ${{ env.ASSET_NAME }}.bundle

  build-windows:
    name: Build Windows binary
    runs-on: windows-latest
    permissions:
      contents: read
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Build release
        run: cargo build --release

      - name: Package
        shell: pwsh
        run: |
          $VERSION = $env:GITHUB_REF_NAME
          $PKG = "xxusbsentinel-$VERSION-windows-x86_64"
          New-Item -ItemType Directory -Force -Path "dist\$PKG"
          Copy-Item "target\release\xxusbsentinel.exe" "dist\$PKG\"
          Copy-Item "README.md","LICENSE" "dist\$PKG\" -ErrorAction SilentlyContinue
          Compress-Archive -Path "dist\$PKG" -DestinationPath "dist\$PKG.zip"
          echo "ASSET=dist/$PKG.zip" >> $env:GITHUB_ENV
          echo "ASSET_NAME=$PKG.zip" >> $env:GITHUB_ENV

      - name: Sign with cosign (keyless)
        uses: sigstore/cosign-installer@v3
      - shell: bash
        run: |
          cosign sign-blob --yes \
            --bundle "${ASSET_NAME}.bundle" \
            "${{ env.ASSET }}"

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: ${{ env.ASSET }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-binary
          path: |
            ${{ env.ASSET }}
            ${{ env.ASSET_NAME }}.bundle

  release:
    name: Create GitHub release
    runs-on: ubuntu-latest
    needs: [build-linux, build-windows]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: dist/*
