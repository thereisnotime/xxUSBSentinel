name: CI

on:
  push:
    branches: [rust-rewrite, main, master]
  pull_request:
    branches: [rust-rewrite, main, master]

env:
  CARGO_TERM_COLOR: always

permissions: read-all

jobs:
  check-linux:
    name: Check / Lint (Linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libusb-1.0-0-dev pkg-config libxdo-dev \
            libgtk-3-dev libxkbcommon-dev libgles2-mesa-dev \
            libwayland-dev libxrandr-dev libxi-dev libxcursor-dev

      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # stable
        with:
          toolchain: stable
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      - run: cargo fmt -- --check
      - run: cargo check
      - run: cargo clippy -- -D warnings

  build-linux:
    name: Build (Linux)
    runs-on: ubuntu-latest
    needs: check-linux
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libusb-1.0-0-dev pkg-config libxdo-dev \
            libgtk-3-dev libxkbcommon-dev libgles2-mesa-dev \
            libwayland-dev libxrandr-dev libxi-dev libxcursor-dev

      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # stable
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      - run: cargo build --release
      - run: ls -lh target/release/xxusbsentinel

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    needs: check-linux
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libusb-1.0-0-dev pkg-config libxdo-dev \
            libgtk-3-dev libxkbcommon-dev libgles2-mesa-dev \
            libwayland-dev libxrandr-dev libxi-dev libxcursor-dev

      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # stable
        with:
          toolchain: stable
          components: llvm-tools-preview

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@ec1b8a233a7ecec171cd56557f7640e9ae9b24c6 # cargo-llvm-cov

      - name: Generate coverage
        run: cargo llvm-cov --all-features --lcov --output-path lcov.info

      - name: Upload to Codecov
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v6.0.0
        with:
          files: lcov.info
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  build-windows:
    name: Build (Windows)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # stable
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - run: cargo build --release
      - run: dir target\release\xxusbsentinel.exe
