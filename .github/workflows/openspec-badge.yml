name: OpenSpec Badge

on:
  push:
    branches: [master]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'Screenshots/**'
      - 'LICENSE'

permissions: read-all

jobs:
  badge:
    name: Generate OpenSpec badges
    runs-on: ubuntu-latest
    continue-on-error: true
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Install pinned OpenSpec CLI
        run: npm install -g @fission-ai/openspec@1.2.0

      - uses: wearetechnative/openspec-badge-action@0ee70666841d4c08d3ec8a95b5546b91abc6125c # main
        with:
          metric_types: number_of_specs,number_of_requirements,open_changes,tasks_status
          badge_style: flat
