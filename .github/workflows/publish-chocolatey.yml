name: Publish to Chocolatey

on:
  workflow_run:
    workflows: ["Release"]
    types: [completed]

env:
  CARGO_TERM_COLOR: always

permissions: read-all

jobs:
  publish:
    name: Push nupkg to Chocolatey
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: windows-latest
    permissions:
      actions: read
    env:
      CHOCOLATEY_API_KEY: ${{ secrets.CHOCOLATEY_API_KEY }}
    steps:
      - name: Download windows-binary artifact
        if: env.CHOCOLATEY_API_KEY != ''
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: windows-binary
          path: dist
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Push to Chocolatey
        if: env.CHOCOLATEY_API_KEY != ''
        shell: pwsh
        run: |
          $nupkg = Get-ChildItem dist\*.nupkg | Select-Object -First 1
          choco apikey --key $env:CHOCOLATEY_API_KEY --source https://push.chocolatey.org/
          choco push $nupkg.FullName --source https://push.chocolatey.org/
